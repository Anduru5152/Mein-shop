<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mein Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#f5f5f5;
  --card:#fff;
  --text:#000;
  --accent:#ff6600;
}
body.dark{
  --bg:#111;
  --card:#1e1e1e;
  --text:#fff;
}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  display:flex;
  gap:10px;
  padding:10px;
  background:var(--accent);
  align-items:center;
}
header h1{color:#fff;margin:0;font-size:20px;cursor:pointer}
.search-bar{flex:1}
.search-bar input{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  box-sizing: border-box;
}
.switch{
  width:42px;height:22px;
  background:#fff;
  border-radius:20px;
  position:relative;
  cursor:pointer;
}
.switch span{
  width:18px;height:18px;
  background:orange;
  border-radius:50%;
  position:absolute;
  top:2px;left:2px;
  transition:.3s;
}
body.dark .switch span{transform:translateX(20px);background:#fff}
.cart-icon{
  width:34px;height:34px;
  border-radius:50%;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  user-select: none;
}
.cart-count{
  position:absolute;
  top:-6px;right:-6px;
  background:red;
  color:#fff;
  font-size:12px;
  padding:2px 6px;
  border-radius:50%;
}
.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}
.product{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
.product img{width:100%;border-radius:10px}
#detailPage,#cartPage{display:none;padding:15px}
.slider{text-align:center;position:relative; min-height: 200px;}
.slide{display:none}
.slide img{width:70%;border-radius:10px;max-height:300px;object-fit:contain}
.prev,.next{
  position:absolute;
  top:50%;
  transform: translateY(-50%);
  background:rgba(0,0,0,.5);
  color:#fff;
  padding:8px;
  border-radius:50%;
  cursor:pointer;
  user-select: none;
}
.prev{left:10px}
.next{right:10px}
button.main{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  cursor:pointer;
}
button.back-btn {
  margin-bottom: 15px;
  padding: 5px 10px;
  cursor: pointer;
}
.cart-item {
  display: flex;
  justify-content: space-between;
  background: var(--card);
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
}
</style>
</head>

<body>

<header>
  <h1 onclick="back()">Mein Shop</h1>
  <div class="search-bar">
    <input id="searchInput" placeholder="Produkte suchen…" onkeyup="search()">
  </div>
  <div class="switch" onclick="toggleDark()"><span></span></div>
  <div class="cart-icon" onclick="openCart()">🛒
    <div class="cart-count" id="count">0</div>
  </div>
</header>

<div class="products" id="productsList"></div>

<div id="detailPage">
  <button class="back-btn" onclick="back()">← Zurück</button>
  <h2 id="dName"></h2>
  <div class="slider" id="slider"></div>
  <p id="dDesc">Hier kommt die Produktbeschreibung</p>
  <p id="dPrice" style="font-weight:bold; font-size: 18px;"></p>
  <div style="display:flex;gap:10px;justify-content:center">
    <button class="main" onclick="buyNow()">Jetzt kaufen</button>
    <button class="main" onclick="addToCart(current)">In Warenkorb</button>
  </div>
</div>

<div id="cartPage">
  <h2>Warenkorb</h2>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
  <div style="display:flex; gap:10px; flex-wrap: wrap;">
    <button class="main" onclick="back()">Weiter einkaufen</button>
    <button class="main" style="background:#cc0000;" onclick="clearCart()">Warenkorb leeren</button>
    <button class="main" style="background:#008000;" onclick="checkoutCart()">Warenkorb bestellen</button>
  </div>
</div>

<script>
// Produktdaten generieren
const products = [...Array(10)].map((_,i)=>({
 id: i,
 name: `Produkt ${i+1}`,
 price: 9.99 + i*10,
 images: [
  `https://via.placeholder.com/400x300?text=Produkt+${i+1}+1`,
  `https://via.placeholder.com/400x300?text=Produkt+${i+1}+2`
 ]
}));

// State-Variablen
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let current = 0, slide = 0;
let currentPage = "list"; // Speichert, auf welcher Seite wir gerade sind

const list = document.getElementById("productsList");
const countEl = document.getElementById("count");
const searchInput = document.getElementById("searchInput");

// Initialisierung beim Start
function init() {
  renderProducts();
  updateCartCount();
  if(localStorage.getItem("dark") === "true") {
    document.body.classList.add("dark");
  }
}

// Produkte auf Startseite rendern
function renderProducts() {
 list.innerHTML = "";
 products.forEach(p => {
  const d = document.createElement("div");
  d.className = "product";
  d.onclick = () => openDetail(p.id);
  d.innerHTML = `
    <img src="${p.images[0]}" alt="${p.name}">
    <h3>${p.name}</h3>
    <p>€${p.price.toFixed(2)}</p>`;
  list.appendChild(d);
 });
}

// Detailseite öffnen
function openDetail(id){
 current = id;
 navigateTo("detail");
 
 const p = products[id];
 dName.innerText = p.name;
 dPrice.innerText = "€" + p.price.toFixed(2);
 
 slider.innerHTML = `
   <div class="prev" onclick="move(-1, event)">❮</div>
   <div class="next" onclick="move(1, event)">❯</div>
 `;
 p.images.forEach(img => {
  slider.insertAdjacentHTML('afterbegin', `<div class="slide"><img src="${img}"></div>`);
 });
 slide = 0;
 showSlide();
}

// Slider Steuerung
function move(n, e){
  if(e) e.stopPropagation();
  slide += n; 
  showSlide();
}

function showSlide(){
 const s = document.querySelectorAll(".slide");
 if(s.length === 0) return;
 if(slide < 0) slide = s.length - 1;
 if(slide >= s.length) slide = 0;
 s.forEach(x => x.style.display = "none");
 s[slide].style.display = "block";
}

// Warenkorb Logik
function addToCart(id){
 cart.push(id);
 localStorage.setItem("cart", JSON.stringify(cart));
 updateCartCount();
}

function updateCartCount() {
  countEl.innerText = cart.length;
}

function openCart(){
 navigateTo("cart");
 renderCart();
}

// Separate Funktion zum Zeichnen des Warenkorbs (wichtig für die Live-Suche)
function renderCart(filterQuery = "") {
 const cartItems = document.getElementById("cartItems");
 const totalEl = document.getElementById("total");
 
 if(cart.length === 0) {
   cartItems.innerHTML = "<p>Dein Warenkorb ist leer.</p>";
   totalEl.innerText = "Gesamt: €0.00";
   return;
 }
 
 const counts = {};
 cart.forEach(id => counts[id] = (counts[id] || 0) + 1);
 
 let total = 0;
 cartItems.innerHTML = "";
 
 Object.keys(counts).forEach(id => {
   const p = products[id];
   const itemTotal = p.price * counts[id];
   total += itemTotal;
   
   // Falls eine Suche aktiv ist, überspringen wir Artikel, die nicht passen
   if (filterQuery && !p.name.toLowerCase().includes(filterQuery)) {
     return; 
   }
   
   cartItems.innerHTML += `
     <div class="cart-item">
       <span>${p.name} (${counts[id]}x)</span>
       <span>€${itemTotal.toFixed(2)}</span>
     </div>
   `;
 });
 
 totalEl.innerText = `Gesamt: €${total.toFixed(2)}`;
}

// Funktion zum Leeren des Warenkorbs
function clearCart() {
  if (cart.length === 0) return;
  if (confirm("Möchtest du den gesamten Warenkorb wirklich leeren?")) {
    cart = [];
    localStorage.removeItem("cart");
    updateCartCount();
    openCart();
  }
}

// Navigation & Dynamischer Platzhalter für die Suche
function navigateTo(page) {
  currentPage = page;
  searchInput.value = ""; // Suchfeld beim Seitenwechsel leeren
  
  list.style.display = (page === "list") ? "grid" : "none";
  detailPage.style.display = (page === "detail") ? "block" : "none";
  cartPage.style.display = (page === "cart") ? "block" : "none";

  // Hier ändert sich der Text der Suchleiste dynamisch!
  if (page === "cart") {
    searchInput.placeholder = "Warenkorb durchsuchen…";
  } else {
    searchInput.placeholder = "Produkte suchen…";
  }
  
  // Wenn wir zur Liste zurückkehren, stellen wir sicher, dass wieder alle Produkte sichtbar sind
  if (page === "list") {
    document.querySelectorAll(".product").forEach(p => p.style.display = "block");
  }
}

function back(){
 navigateTo("list");
}

// Checkout E-Mails
function buyNow(){
 const p = products[current];
 location.href = `mailto:online.shop551552@gmail.com?subject=Bestellung&body=Ich möchte folgendes Produkt kaufen: ${p.name} für €${p.price.toFixed(2)}.`;
}

function checkoutCart() {
  if(cart.length === 0) return;
  const counts = {};
  cart.forEach(id => counts[id] = (counts[id] || 0) + 1);
  
  let text = "Ich möchte folgende Produkte bestellen:%0D%0A";
  Object.keys(counts).forEach(id => {
    text += `- ${products[id].name} (${counts[id]}x)%0D%0A`;
  });
  
  location.href = `mailto:online.shop551552@gmail.com?subject=Warenkorb Bestellung&body=${text}`;
}

// Intelligente Suche (Weiß, auf welcher Seite sie sich befindet)
function search(){
 const q = searchInput.value.toLowerCase();
 
 if (currentPage === "cart") {
   // Wenn wir im Warenkorb sind, filtern wir die Warenkorb-Einträge live
   renderCart(q);
 } else {
   // Wenn wir auf der Produktliste (oder Detailseite) sind, filtern wir das Hauptgitter
   document.querySelectorAll(".product").forEach((p, i) => {
    p.style.display = products[i].name.toLowerCase().includes(q) ? "block" : "none";
   });
 }
}

// Dark Mode Switch mit Speicherfunktion
function toggleDark(){
 const isDark = document.body.classList.toggle("dark");
 localStorage.setItem("dark", isDark);
}

// Starten
init();
</script>

</body>
</html>
